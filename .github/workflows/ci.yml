
name: TitanGate CI Pipeline

# 1. THE TRIGGER: Wake up the robots when Aizen pushes to the main branch
on:
  push:
    branches:
      - main

# 2. THE FACTORY: What the robots should actually do
jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download a copy of Aizen's code
      - name: Grab the Code
        uses: actions/checkout@v4

      # Step B: Have the robots use your vault keys to unlock Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step C: Build the shipping container and stamp your username on it!
      - name: Build the Container
        run: docker build -t charan212004/titangate:latest .

      # Step D: Drive the container up to Docker Hub and park it on the shelf
      - name: Push to Docker Hub
        run: docker push charan212004/titangate:latest

















